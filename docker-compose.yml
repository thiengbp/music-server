services:
  music-server:
    build: .
    container_name: music-server
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - ${HOST_MUSIC_PATH:-./music}:/music:ro
    environment:
      - PORT=3000
      - DATABASE_PATH=/app/data/music.db
      - MUSIC_LIBRARY_PATH=/music
      - LIBRARY_SCAN_INTERVAL_MINUTES=${LIBRARY_SCAN_INTERVAL_MINUTES:-15}
      - TRACKS_MAX_LIMIT=${TRACKS_MAX_LIMIT:-1000}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
